<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>طريق النور - لا يوجد اتصال</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f766e, #0d9488);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 400px; width: 100%; }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 26px; margin-bottom: 16px; font-weight: bold; }
    p { 
      font-size: 16px; 
      opacity: 0.9; 
      margin-bottom: 32px; 
      line-height: 1.8; 
    }
    .retry-btn {
      background: white;
      color: #0f766e;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .retry-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌐</div>
    <h1>طريق النور</h1>
    <p>
      لا يوجد اتصال بالإنترنت<br/>
      يرجى التحقق من الاتصال<br/>
      والمحاولة مرة أخرى
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 إعادة المحاولة
    </button>
  </div>
</body>
</html>
