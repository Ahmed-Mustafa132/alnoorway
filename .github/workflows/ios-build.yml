name: iOS Build
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22 # تم التحديث للنسخة المطلوبة من Capacitor CLI

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Initialize and Sync Capacitor iOS
        run: |
          # تثبيت أحدث إصدارات Capacitor لتجنب التعارض
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest

          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            echo "iOS folder already exists, syncing..."
          fi

          npx cap sync ios

      - name: Build iOS App (Archive)
        run: |
          cd ios/App
          # بناء الـ Archive مع تخطي التوقيع مؤقتاً للتأكد من سلامة الكود
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-archive
          path: ios/App/App.xcarchive
