name: iOS Build
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4 # حدثنا النسخة لتجنب التحذيرات

      - name: Install Node.js
        uses: actions/setup-node@v4 # حدثنا النسخة لتجنب التحذيرات
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Initialize and Sync Capacitor iOS
        run: |
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest

          # مسح مجلد ios القديم لو موجود لضمان بناء نظيف بالنسخة الجديدة
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Build iOS App (Xcode Project)
        run: |
          # في النسخة الجديدة، بنبني الـ Project نفسه مش الـ Workspace لو ملقيناهوش
          cd ios/App

          # أمر بناء مرن: بيجرب يبني الـ Workspace ولو ملقاهوش بيبني الـ Project
          if [ -d "App.xcworkspace" ]; then
            xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath App.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          else
            xcodebuild -project App.xcodeproj -scheme App -sdk iphoneos -configuration Release archive -archivePath App.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-archive
          path: ios/App/App.xcarchive
