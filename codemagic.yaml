workflows:
  ios-alnoorway-auto:
    name: AlNoorway iOS Auto Flow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: noourway
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alnoorway.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_ID: "6762559077"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Re-sync Capacitor
        script: |
          rm -rf ios
          npx cap add ios
          # تعطيل الـ Swift Package Manager لمنع تضارب الإصدارات
          npx cap build ios --no-update
          npx cap sync ios

      - name: Check Files Location (For Ahmed)
        script: |
          echo "--- عرض مجلد node_modules للمكتبة المطلوبة ---"
          ls -R node_modules/@codetrix-studio/capacitor-google-auth | grep .podspec
          echo "--- عرض مجلد ios/App للتأكد من الـ Workspace ---"
          ls -R ios/App

      - name: Create Podfile and Install
        script: |
          cd ios/App
          cat <<EOF > Podfile
          platform :ios, '17.0'
          use_frameworks!

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCommunityAppleSignIn', :path => '../../node_modules/@capacitor-community/apple-sign-in'
            pod 'CapacitorDevice', :path => '../../node_modules/@capacitor/device'
            pod 'CodetrixStudioCapacitorGoogleAuth', :path => '../../node_modules/@codetrix-studio/capacitor-google-auth/CodetrixStudioCapacitorGoogleAuth.podspec'
          end
          EOF
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build ipa for distribution
        script: |
          # محاولة البناء مع تجاهل حل الـ Package Dependencies يدوياً لأننا نستخدم Pods
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme "$XCODE_SCHEME" \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath $(pwd)/build/ios/xcarchive/App.xcarchive \
                     -destination 'generic/platform=iOS' \
                     -allowProvisioningUpdates \
                     SKIP_INSTALL=NO

          # استكمال توليد الـ IPA
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"

      - name: Publish to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish --path "$IPA_PATH" --apple-id "$APP_ID"
          else
            echo "Error: IPA file not found."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
