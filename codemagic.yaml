workflows:
  ios-alnoorway-auto: # رجعنا الاسم ده عشان كود ماجيك ميتوهش
    name: AlNoorway iOS Appetize Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
    scripts:
      - name: Force Downgrade & Install
        script: |
          npm install @capacitor/core@7.6.2 @capacitor/ios@7.6.2 @capacitor/cli@7.6.2 @capacitor/android@7.0.0 --save-exact
          npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Reset & Sync Capacitor
        script: |
          rm -rf ios
          export CAPACITOR_PROJECT_USE_SPM=false
          npx cap add ios
          npx cap sync ios
          rm -f ios/App/Package.swift

      - name: Create Podfile and Install
        script: |
          cd ios/App
          cat <<EOF > Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCommunityAppleSignIn', :path => '../../node_modules/@capacitor-community/apple-sign-in'
            pod 'CodetrixStudioCapacitorGoogleAuth', :path => '../../node_modules/@codetrix-studio/capacitor-google-auth/CodetrixStudioCapacitorGoogleAuth.podspec'
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
              end
            end
          end
          EOF
          pod install

      - name: Build for Simulator (Appetize)
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
                     -scheme "$XCODE_SCHEME" \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     -derivedDataPath build

          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../appetize_bundle.zip App.app

    artifacts:
      - appetize_bundle.zip
    publishing:
      email:
        recipients:
          - ahmedmustafa0384@gmail.com
