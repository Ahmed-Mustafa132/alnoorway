workflows:
  ios-alnoorway-auto:
    name: AlNoorway iOS Auto Flow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: noourway
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alnoorway.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_ID: "6762559077"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
        
      - name: Build web app
        script: npm run build
        
      - name: Re-sync Capacitor
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          
      - name: Create Podfile and Install
        script: |
          cd ios/App
          cat <<EOF > Podfile
          platform :ios, '17.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCommunityAppleSignIn', :path => '../../node_modules/@capacitor-community/apple-sign-in'
            pod 'CapacitorDevice', :path => '../../node_modules/@capacitor/device'
            pod 'CodetrixStudioCapacitorGoogleAuth', :path => '../../node_modules/@codetrix-studio/capacitor-google-auth/CodetrixStudioCapacitorGoogleAuth.podspec'
          end
          EOF
          pod repo update
          pod install
          
      - name: Set up code signing
        script: xcode-project use-profiles
        
      - name: Build ipa for distribution
        script: |
          # 1. تعريف المتغيرات
          WORKSPACE="ios/App/App.xcworkspace"
          SCHEME="App"
          
          # 2. تنظيف المشروع وبناء الـ Archive (الطريقة الرسمية)
          xcodebuild -workspace "$WORKSPACE" \
                     -scheme "$SCHEME" \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath $(pwd)/build/ios/xcarchive/App.xcarchive \
                     DEVELOPMENT_TEAM=6P74F96A93 \
                     SKIP_INSTALL=NO
          
          # 3. تصدير الـ IPA من الـ Archive
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"
            
      - name: Publish to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish --path "$IPA_PATH" --apple-id "$APP_ID"
          else
            echo "Error: IPA file not found."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - ahmedmustafa0384@gmail.com