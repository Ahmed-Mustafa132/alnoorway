workflows:
  ios-alnoorway-auto:
    name: AlNoorway iOS Auto Flow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alnoorway.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_ID: "6758340330"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app and Sync
        script: |
          npm run build
          npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles --bundle-id com.alnoorway.app
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
      - name: Publish to App Store Connect
        script: |
          app-store-connect publish \
            --path $(find build/ios/ipa -name "*.ipa" | head -n 1) \
            --apple-id "$APP_ID" \
            --testflight
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - osakr100@gmail.com
          - ahmedmustafa0384@gmail.com
