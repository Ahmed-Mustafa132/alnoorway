workflows:
  ios-alnoorway-auto:
    name: AlNoorway iOS Auto Flow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: noourway
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alnoorway.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_ID: "6762559077"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
        
      - name: Build web app
        script: npm run build
        
      - name: Re-sync Capacitor
        script: |
          # مسح وإعادة بناء فولدر iOS لضمان نظافة البيئة
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          
      - name: Create Podfile and Install
        script: |
          cd ios/App
          cat <<EOF > Podfile
          platform :ios, '14.0'
          use_frameworks!

          # دالة ذكية للبحث عن مسار الـ podspec أوتوماتيكياً داخل node_modules
          def find_podspec_path(name)
            # محاولة البحث في المسار المباشر
            path = File.expand_path("../../node_modules/#{name}", Dir.pwd)
            return path if File.exist?(File.join(path, "#{name.split('/').last}.podspec"))
            
            # محاولة البحث في كل المجلدات الفرعية لو فشل المسار المباشر
            spec_file = Dir.glob(File.expand_path("../../node_modules/**/#{name.split('/').last}.podspec", Dir.pwd)).first
            return File.dirname(spec_file) if spec_file
            
            # مسار احتياطي أخير
            File.expand_path("../../node_modules/#{name}", Dir.pwd)
          end

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            
            # استدعاء المكتبات المطلوبة لتخطي رفض آبل
            pod 'CapacitorCommunityAppleSignIn', :path => find_podspec_path('@capacitor-community/apple-sign-in')
            pod 'CapacitorDevice', :path => find_podspec_path('@capacitor/device')
            pod 'CapacitorGoogleAuth', :path => find_podspec_path('@codetrix-studio/capacitor-google-auth')
          end
          EOF
          pod install
          
      - name: Set up code signing
        script: xcode-project use-profiles
        
      - name: Build ipa for distribution
        script: |
          # البناء باستخدام الـ Workspace الذي تم توليده
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"
            
      - name: Publish to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish --path "$IPA_PATH" --apple-id "$APP_ID"
          else
            echo "IPA file not found, build might have failed."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - ahmedmustafa0384@gmail.com