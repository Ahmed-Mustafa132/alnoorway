workflows:
  ios-alnoorway-auto:
    name: AlNoorway iOS Auto Flow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: noourway
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alnoorway.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_ID: "6762559077"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Re-sync Capacitor
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Create Podfile and Install
        script: |
          cd ios/App
          # استخدام استراتيجية "auto-include" لضمان إيجاد كل المكتبات برمجياً
          cat <<EOF > Podfile
          platform :ios, '14.0'
          use_frameworks!

          # هذا السطر يخبر CocoaPods بالبحث عن المكتبات في مكانها الصحيح آلياً
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'

          target 'App' do
            cap_all_pods
          end
          EOF
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"

      - name: Publish to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish --path "$IPA_PATH" --apple-id "$APP_ID"
          fi
