workflows:
  ios-alnoorway-auto:
    name: AlNoorway iOS Auto Flow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: noourway
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alnoorway.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_ID: "6762559077"
      node: latest
      xcode: latest
    scripts:
      - name: Force Downgrade & Install
        script: |
          # إجبار المشروع على إصدارات متوافقة (Version 7) لضمان الاستقرار
          npm install @capacitor/core@7.6.2 @capacitor/ios@7.6.2 @capacitor/cli@7.6.2 @capacitor/android@7.0.0 --save-exact
          npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Reset & Sync Capacitor
        script: |
          rm -rf ios
          export CAPACITOR_PROJECT_USE_SPM=false
          npx cap add ios
          npx cap sync ios
          # تنظيف أي ملفات زائدة قد تسبب تضارب
          rm -f ios/App/Package.swift
          rm -rf ios/App/App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm

      - name: Create Podfile and Install
        script: |
          cd ios/App
          cat <<EOF > Podfile
          platform :ios, '14.0'
          use_frameworks!

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCommunityAppleSignIn', :path => '../../node_modules/@capacitor-community/apple-sign-in'
            pod 'CodetrixStudioCapacitorGoogleAuth', :path => '../../node_modules/@codetrix-studio/capacitor-google-auth/CodetrixStudioCapacitorGoogleAuth.podspec'
          end

          # سكريبت لتوحيد إصدار iOS لجميع المكتبات لمنع تضارب الـ Deployment Target
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
              end
            end
          end
          EOF
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build ipa for distribution
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme "$XCODE_SCHEME" \
                     -sdk iphoneos \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     archive -archivePath $(pwd)/build/ios/xcarchive/App.xcarchive \
                     -resolvePackageDependencies=NO \
                     SKIP_INSTALL=NO

          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"

      - name: Publish to App Store Connect
        script: |
          IPA_PATH=\$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -n "\$IPA_PATH" ]; then
            app-store-connect publish --path "\$IPA_PATH" --apple-id "\$APP_ID"
          fi
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - ahmedmustafa0384@gmail.com
