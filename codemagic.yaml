workflows:
  ios-alnoorway-auto:
    name: AlNoorway iOS Auto Flow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: noourway
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alnoorway.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_ID: "6762559077"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
        
      - name: Build web app and Capacitor Sync
        script: |
          npm run build
          # الأمر ده هو اللي المفروض يكريت الـ Podfile لو مش موجود
          npx cap sync ios
          
      - name: Install CocoaPods
        script: |
          # هندخل للمسار ونأكد إن فيه ملف Podfile
          cd ios/App
          if [ ! -f "Podfile" ]; then
            echo "Podfile missing, creating a basic one..."
            npx cap add ios
          fi
          pod install
          
      - name: Set up code signing
        script: xcode-project use-profiles
        
      - name: Build ipa for distribution
        script: |
          # هنبني بالـ Project مباشرة عشان نتفادى مشاكل الـ Workspace المفقود
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
            
      - name: Publish to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          app-store-connect publish --path "$IPA_PATH" --apple-id "$APP_ID"
    artifacts:
      - build/ios/ipa/*.ipa