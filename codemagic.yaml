workflows:
  ios-alnoorway-auto:
    name: AlNoorway iOS Full Build & Publish
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: noourway

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alnoorway.app

      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "6762559077"

      node: latest
      xcode: latest

    scripts:
      - name: Install Dependencies
        script: |
          npm install \
          @capacitor/core@7.6.2 \
          @capacitor/ios@7.6.2 \
          @capacitor/cli@7.6.2 \
          @capacitor/android@7.6.2 \
          --save-exact

          npm install --legacy-peer-deps

      - name: Build Web App
        script: |
          npm run build

      - name: Recreate iOS Platform
        script: |
          rm -rf ios

          npx cap add ios

          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App

          pod deintegrate || true
          rm -rf Pods
          rm -rf Podfile.lock

          pod install --repo-update

      - name: Setup Apple Sign In Entitlements
        script: |
          mkdir -p ios/App/App

          cat > ios/App/App/App.entitlements <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.applesignin</key>
              <array>
                  <string>Default</string>
              </array>
          </dict>
          </plist>
          EOF

          python3 - <<'PYTHON'
          import re

          path = "ios/App/App.xcodeproj/project.pbxproj"

          with open(path, "r") as f:
              content = f.read()

          if "CODE_SIGN_ENTITLEMENTS" not in content:
              content = re.sub(
                  r'CODE_SIGN_STYLE = Automatic;',
                  'CODE_SIGN_STYLE = Automatic;\\n\\t\\t\\t\\tCODE_SIGN_ENTITLEMENTS = App/App.entitlements;',
                  content
              )

          with open(path, "w") as f:
              f.write(content)

          print("✅ Apple Sign In entitlement added")
          PYTHON

      - name: Generate iOS Assets
        script: |
          npx @capacitor/assets generate --ios

      - name: Build Simulator App
        script: |
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          APP_PATH=$(find derived_data/Build/Products -name "*.app" -type d | head -n 1)

          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            zip -r appetize_bundle.zip "$APP_PATH"
          else
            echo "❌ .app file not found"
            exit 1
          fi

      - name: Set Up Code Signing
        script: |
          xcode-project use-profiles

      - name: Increment Build Number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build IPA for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

      - name: Publish to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)

          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish \
              --path "$IPA_PATH" \
              --apple-id "$APP_ID"
          else
            echo "❌ IPA not found"
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - "*.zip"

    publishing:
      email:
        recipients:
          - ahmedmustafa0384@gmail.com
